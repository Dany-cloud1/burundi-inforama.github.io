<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BURUNDI INFORAMA — L'Actualité en Temps Réel</title>
  <meta name="description" content="Agrégateur d'actualités burundaises 24/7. Politique, économie, sport, culture — en français et en kirundi.">
  <meta property="og:title" content="BURUNDI INFORAMA">
  <meta property="og:description" content="L'actualité burundaise en temps réel — 24h/24, 7j/7">
  <meta property="og:type" content="website">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Source+Serif+4:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet">
  <style>
    :root {
      --green: #007A3D;
      --red: #CE1126;
      --gold: #F5C400;
      --dark: #0a0c0b;
      --dark2: #111510;
      --dark3: #181c17;
      --border: rgba(245,196,0,0.15);
      --text: #e8ede8;
      --muted: #7a8a7a;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      background: var(--dark);
      color: var(--text);
      font-family: 'Source Serif 4', Georgia, serif;
      font-weight: 300;
      overflow-x: hidden;
    }

    /* ── GRAIN OVERLAY ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 1000;
      opacity: 0.4;
    }

    /* ── NAV ── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 40px;
      background: rgba(10,12,11,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
    }

    .nav-flag {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      overflow: hidden;
      flex-shrink: 0;
    }

    .nav-name {
      font-family: 'Playfair Display', serif;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--text);
    }

    .nav-links {
      display: flex;
      gap: 32px;
      list-style: none;
    }

    .nav-links a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.78rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      transition: color 0.2s;
    }

    .nav-links a:hover { color: var(--gold); }

    .nav-cta {
      background: var(--green);
      color: white !important;
      padding: 8px 18px;
      border-radius: 2px;
      font-weight: 600 !important;
    }

    .nav-cta:hover { background: #009a4e !important; color: white !important; }

    /* ── HERO ── */
    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 120px 24px 80px;
      position: relative;
      overflow: hidden;
    }

    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% 40%, rgba(0,122,61,0.12) 0%, transparent 70%),
        radial-gradient(ellipse 40% 40% at 20% 80%, rgba(206,17,38,0.06) 0%, transparent 60%),
        radial-gradient(ellipse 40% 40% at 80% 20%, rgba(245,196,0,0.05) 0%, transparent 60%);
    }

    /* Burundi flag SVG emblem background */
    .hero-emblem {
      position: absolute;
      width: 600px;
      height: 600px;
      opacity: 0.03;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    .live-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(206,17,38,0.15);
      border: 1px solid rgba(206,17,38,0.3);
      color: #ff6b7a;
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 0.72rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 32px;
      animation: fadein 0.8s ease both;
    }

    .live-dot {
      width: 7px;
      height: 7px;
      background: #ff4455;
      border-radius: 50%;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }

    .hero-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(3rem, 10vw, 7rem);
      font-weight: 900;
      line-height: 0.9;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
      animation: fadein 0.8s 0.1s ease both;
    }

    .hero-title span {
      display: block;
      background: linear-gradient(135deg, var(--gold) 0%, #fff8d6 50%, var(--gold) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-subtitle-line {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.4rem, 4vw, 2.8rem);
      font-weight: 700;
      color: var(--green);
      letter-spacing: 0.05em;
      margin-bottom: 28px;
      animation: fadein 0.8s 0.2s ease both;
    }

    .hero-desc {
      max-width: 540px;
      font-size: 1.05rem;
      line-height: 1.75;
      color: var(--muted);
      margin-bottom: 48px;
      animation: fadein 0.8s 0.3s ease both;
    }

    .hero-actions {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
      animation: fadein 0.8s 0.4s ease both;
    }

    .btn-primary {
      background: var(--green);
      color: white;
      padding: 14px 32px;
      border-radius: 2px;
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .btn-primary:hover {
      background: #009a4e;
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,122,61,0.3);
    }

    .btn-secondary {
      background: transparent;
      color: var(--text);
      padding: 14px 32px;
      border-radius: 2px;
      text-decoration: none;
      font-size: 0.9rem;
      letter-spacing: 0.05em;
      border: 1px solid rgba(255,255,255,0.2);
      transition: all 0.2s;
    }

    .btn-secondary:hover {
      border-color: var(--gold);
      color: var(--gold);
    }

    @keyframes fadein {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── STATS BAR ── */
    .stats-bar {
      background: var(--dark3);
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      padding: 32px 40px;
      display: flex;
      justify-content: center;
      gap: 64px;
      flex-wrap: wrap;
    }

    .stat {
      text-align: center;
    }

    .stat-num {
      font-family: 'Playfair Display', serif;
      font-size: 2.2rem;
      font-weight: 900;
      color: var(--gold);
      display: block;
    }

    .stat-label {
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 4px;
    }

    /* ── SECTIONS ── */
    section {
      padding: 80px 24px;
      max-width: 1100px;
      margin: 0 auto;
    }

    .section-tag {
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 12px;
      display: block;
    }

    .section-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      font-weight: 700;
      line-height: 1.15;
      margin-bottom: 16px;
    }

    .section-desc {
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.8;
      max-width: 560px;
      margin-bottom: 48px;
    }

    /* ── FORMATS GRID ── */
    .formats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 2px;
    }

    .format-card {
      background: var(--dark3);
      padding: 28px;
      border: 1px solid var(--border);
      transition: all 0.3s;
      position: relative;
      overflow: hidden;
    }

    .format-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 3px;
      height: 0;
      background: var(--gold);
      transition: height 0.3s;
    }

    .format-card:hover::before { height: 100%; }
    .format-card:hover { background: #1a1f19; }

    .format-emoji {
      font-size: 1.8rem;
      margin-bottom: 12px;
      display: block;
    }

    .format-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 8px;
      color: var(--text);
    }

    .format-desc {
      font-size: 0.85rem;
      color: var(--muted);
      line-height: 1.6;
    }

    /* ── ABOUT ── */
    .about-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 60px;
      align-items: center;
    }

    .about-visual {
      position: relative;
    }

    .flag-circle {
      width: 280px;
      height: 280px;
      border-radius: 50%;
      overflow: hidden;
      border: 3px solid var(--border);
      margin: 0 auto;
      box-shadow: 0 0 60px rgba(0,122,61,0.2);
    }

    .about-text p {
      color: var(--muted);
      line-height: 1.9;
      margin-bottom: 20px;
      font-size: 0.95rem;
    }

    .highlight {
      color: var(--gold);
      font-style: italic;
    }

    /* ── ADVERTISE ── */
    .advertise-section {
      background: var(--dark3);
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      padding: 80px 24px;
    }

    .advertise-inner {
      max-width: 1100px;
      margin: 0 auto;
    }

    .audience-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px;
      margin-bottom: 48px;
    }

    .audience-card {
      background: var(--dark);
      border: 1px solid var(--border);
      padding: 24px;
      border-radius: 2px;
    }

    .audience-icon {
      font-size: 1.5rem;
      margin-bottom: 10px;
    }

    .audience-title {
      font-weight: 600;
      font-size: 0.9rem;
      margin-bottom: 6px;
      color: var(--text);
    }

    .audience-desc {
      font-size: 0.8rem;
      color: var(--muted);
      line-height: 1.6;
    }

    .packages-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }

    .package-card {
      border: 1px solid var(--border);
      padding: 32px;
      position: relative;
    }

    .package-card.featured {
      border-color: var(--gold);
      background: rgba(245,196,0,0.03);
    }

    .package-tag {
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 8px;
    }

    .package-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 16px;
    }

    .package-features {
      list-style: none;
      margin-bottom: 24px;
    }

    .package-features li {
      font-size: 0.85rem;
      color: var(--muted);
      padding: 6px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .package-features li::before {
      content: '✓';
      color: var(--green);
      font-weight: bold;
      flex-shrink: 0;
    }

    /* ── CONTACT ── */
    #contact {
      text-align: center;
    }

    .contact-box {
      max-width: 560px;
      margin: 0 auto;
      background: var(--dark3);
      border: 1px solid var(--border);
      padding: 48px;
    }

    .contact-links {
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-top: 32px;
    }

    .contact-link {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px 20px;
      background: var(--dark);
      border: 1px solid var(--border);
      text-decoration: none;
      color: var(--text);
      transition: all 0.2s;
    }

    .contact-link:hover {
      border-color: var(--gold);
      color: var(--gold);
    }

    .contact-link-icon {
      font-size: 1.3rem;
      width: 32px;
      text-align: center;
    }

    .contact-link-text {
      text-align: left;
    }

    .contact-link-label {
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .contact-link-value {
      font-size: 0.9rem;
      font-weight: 600;
      margin-top: 2px;
    }

    /* ── FOOTER ── */
    footer {
      background: var(--dark2);
      border-top: 1px solid var(--border);
      padding: 40px 24px;
      text-align: center;
    }
